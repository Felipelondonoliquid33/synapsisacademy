
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapsis Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Oswald:wght@400;500;700&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
      :root {
        /* New Electric Pastel Palette */
        --color-primary-lime: #CCFF00;   /* Acid Volt */
        --color-secondary-pink: #FF3366; /* Neon Raspberry */
        --color-accent-purple: #C084FC;  /* Electric Lavender */
        --color-text-main: #1E1B4B;      /* Deep Indigo */
        --color-bg-light: #FDFBF7;       /* Clean Off-White */
        --color-border-grey: #E5E7EB;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--color-bg-light);
        color: var(--color-text-main);
        overflow-x: hidden;
      }
      h1, h2, h3, .heading-font {
        font-family: 'Oswald', sans-serif;
      }
      
      /* Smooth reveal animation classes */
      .reveal-text {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg-light);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-text-main);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-secondary-pink);
      }
      
      .noise-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "matter-js": "https://esm.sh/matter-js@^0.20.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div class="noise-bg"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
